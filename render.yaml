services:
  - name: literacy-platform-backend
    type: web
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: APP_TIMEZONE
        value: Asia/Almaty
      - key: DATABASE_URL
        fromDatabase:
          name: literacy-platform-db
          property: connectionString
      - key: SEED_ADMIN_ON_STARTUP
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: System
      - key: ADMIN_LAST_NAME
        value: Admin
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

databases:
  - name: literacy-platform-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "18"
